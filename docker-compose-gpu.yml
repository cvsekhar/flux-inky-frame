version: '3.8'

services:
  flux-inky-frame:
    build: .
    container_name: flux-inky-frame
    ports:
      - "5000:5000"
    volumes:
      # Volume for HuggingFace model cache (persists downloaded models)
      - huggingface-cache:/root/.cache/huggingface
      # Volume for generated images (persists your generated images)
      - ./generated_images:/app/generated_images
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  # Named volume for HuggingFace cache
  huggingface-cache:
    driver: local
